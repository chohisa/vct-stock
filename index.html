<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>VCT 주식 거래소</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-color: #228be6; --danger-color: #fa5252; --success-color: #40c057; --dark-color: #212529; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; color: var(--dark-color); }
        .wrapper { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; padding-bottom: 10px; border-bottom: 2px solid #edf2f7; font-size: 1.3rem; display: flex; justify-content: space-between; align-items: center; }
        
        /* 탭 스타일 */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { padding: 10px 20px; border: 1px solid #dee2e6; background: #fff; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        /* 전광판 */
        .ticker-board { grid-column: 1 / 3; background: #1a1b1e; color: #fff; padding: 15px; border-radius: 12px; }
        .ticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; max-height: 220px; overflow-y: auto; padding-right: 5px; }
        .ticker-item {
            background: #2c2e33; 
            padding: 8px 12px; 
            border-radius: 6px; 
            font-size: 0.85rem; 
            cursor: pointer; 
            border: 1px solid transparent; 
        /* border-left 스타일은 유지하되 색상은 JS가 주입합니다 */
            border-left: 6px solid #868e96;
        }

        .ticker-item:hover {
            transform: scale(1.07); /* 자연스러운 확대 */
            z-index: 10;
        }
        .ticker-item .price { font-weight: bold; font-size: 1rem; margin-top: 4px; }
        .up { color: #ff6b6b; } .down { color: #4dadf7; }
        
        .user-status { display: flex; justify-content: space-around; background: #e7f5ff; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .status-val { font-size: 1.2rem; font-weight: bold; color: var(--primary-color); }
        .table-wrapper { max-height: 200px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        .table-wrapper thead th { position: sticky; top: 0; background: #f1f3f5; z-index: 1; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th, td { padding: 10px; border-bottom: 1px solid #dee2e6; }
        th { background: #f1f3f5; position: sticky; top: 0; }
        
        .trade-form select, .trade-form input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 6px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; width: 100%; }
        .btn-buy { background: var(--danger-color); } .btn-sell { background: var(--primary-color); }
        .chart-box { height: 250px; position: relative; }
        .nav-btn { background: #6c757d; color: white; text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; }
    </style>
</head>

let currentTab = 'PLAYER';
let currentSelectedId = '';
let stockChart = null;

function renderAll() {
    const players = JSON.parse(localStorage.getItem('market_players'));
    const teams = JSON.parse(localStorage.getItem('market_teams'));
    const userData = JSON.parse(localStorage.getItem('userData'));
    
    const grid = document.getElementById('tickerGrid');
    const tradeSel = document.getElementById('tradeSelect');
    
    grid.innerHTML = '';
    tradeSel.innerHTML = '';
    
    // 전광판 탭 메뉴 활성화 표시
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${currentTab}`).classList.add('active');

    // 현재 탭의 리스트를 가져온 뒤, 가격(price)이 높은 순서대로 정렬합니다.
    const currentList = currentTab === 'PLAYER' ? players : teams;
    currentList.sort((a, b) => b.price - a.price); 

    if(!currentSelectedId || !currentList.find(x => x.id === currentSelectedId)) {
        currentSelectedId = currentList[0].id;
    }

    currentList.forEach(item => {
        const prevPrice = item.history.length > 1 ? item.history[item.history.length - 2] : item.history[0];
        const changeRate = (((item.price - prevPrice) / prevPrice) * 100).toFixed(1);
        const changeClass = changeRate > 0 ? 'up' : (changeRate < 0 ? 'down' : '');
        const changeSign = changeRate > 0 ? '▲' : (changeRate < 0 ? '▼' : '');
        
        const subInfo = item.type === 'PLAYER' ? `ACS ${item.acs}` : `${item.rank}위`;

        // 💡 [수정] 데이터에 color가 있으면 쓰고, 없으면 기본 회색(#868e96)을 사용합니다.
        const customColor = item.color || '#868e96';

        // 💡 [수정] 테두리 색상(border-left-color) 인라인 스타일을 동적으로 주입합니다.
        grid.innerHTML += `
            <div class="ticker-item" style="border-left-color: ${customColor};" onclick="selectStock('${item.id}')">
                <div><strong>${item.name}</strong></div>
                <div class="price ${changeClass}">${Math.round(item.price).toLocaleString()}원</div>
                <div style="font-size:0.75rem; color:#aaa;">${subInfo} (${changeSign}${Math.abs(changeRate)}%)</div>
            </div>`;
    });

    // 주문창 드롭다운도 보기 좋게 가격 순서대로 정렬하여 노출
    const sortedPlayers = [...players].sort((a,b) => b.price - a.price);
    const sortedTeams = [...teams].sort((a,b) => b.price - a.price);

    sortedPlayers.forEach(p => { tradeSel.innerHTML += `<option value="${p.id}">[선수] ${p.name} (${Math.round(p.price)}원)</option>`; });
    sortedTeams.forEach(t => { tradeSel.innerHTML += `<option value="${t.id}">[팀] ${t.name} (${Math.round(t.price)}원)</option>`; });
    
    tradeSel.value = currentSelectedId;
    
    renderPortfolio(players, teams, userData);
    renderChart(currentList);
}

function renderPortfolio(players, teams, userData) {
    document.getElementById('userSeed').innerText = userData.seed.toLocaleString() + "원";
    const tbody = document.getElementById('portfolioTable');
    tbody.innerHTML = '';
    
    let totalStockValue = 0;
    let totalInvested = 0; 

    const allStocks = [...players, ...teams];

 
let portfolioEntries = Object.entries(userData.portfolio).filter(([pid, hold]) => hold.qty > 0);

portfolioEntries.sort((a, b) => {
    
    if (b[1].qty !== a[1].qty) {
        return b[1].qty - a[1].qty;
    }
    
    const stockA = allStocks.find(item => item.id === a[0]);
    const stockB = allStocks.find(item => item.id === b[0]);
    const priceA = stockA ? stockA.price : 0;
    const priceB = stockB ? stockB.price : 0;
    
    return priceB - priceA; 
});

    portfolioEntries.forEach(([pid, hold]) => {
        let p = allStocks.find(item => item.id === pid);
        if (!p) return;

        let buyTotal = hold.avgPrice * hold.qty;
        let currentTotal = p.price * hold.qty;
        let profit = currentTotal - buyTotal;
        let profitRate = buyTotal > 0 ? ((profit / buyTotal) * 100).toFixed(1) : 0;
        
        totalStockValue += currentTotal;
        totalInvested += buyTotal;
        
        let profitClass = profit > 0 ? 'up' : (profit < 0 ? 'down' : '');

        // 💡 중요: <td>가 정확히 6개인지 확인하세요 (헤더와 개수 일치)
        tbody.innerHTML += `
    <tr style="border-bottom: 1px solid #e9ecef;">
        <td style="display: flex; align-items: center; gap: 8px;">
            <span style="display: inline-block; width: 12px; height: 12px; border-radius: 50%; background-color: ${p.color || '#868e96'}; flex-shrink: 0;"></span>
            <strong>${p.name}</strong>
        </td>
        <td>${p.type === 'PLAYER' ? '선수' : '팀'}</td>
        <td>${hold.qty}주</td>
        <td>${Math.round(hold.avgPrice).toLocaleString()}원</td>
        <td>${Math.round(p.price).toLocaleString()}원</td>
        <td class="${profitClass}">${profit > 0 ? '+' : ''}${Math.round(profit).toLocaleString()}원</td>
    </tr>`;
    });

    // 자산 정보 업데이트
    document.getElementById('userTotalAsset').innerText = Math.round(userData.seed + totalStockValue).toLocaleString() + "원";
    
    // 전체 수익률 표시 (HTML에 totalPortfolioRate ID가 있는 경우)
    const totalProfit = totalStockValue - totalInvested;
    const totalRate = totalInvested > 0 ? ((totalProfit / totalInvested) * 100).toFixed(1) : 0;
    const rateEl = document.getElementById('totalPortfolioRate');
    if (rateEl) rateEl.innerText = `${totalRate}%`;
}
function openRosterSelector(slotRole) {
    currentSelectingSlot = slotRole;
    const modal = document.getElementById('playerSelectorModal');
    const listDiv = document.getElementById('myOwnedPlayerList');
    const titleEl = document.getElementById('modalTitle');
    
    if (titleEl) titleEl.innerText = `[${slotRole}] 선수 주식`;
    listDiv.innerHTML = '';

    let allPlayers = JSON.parse(localStorage.getItem('market_players')) || [];
    let userData = JSON.parse(localStorage.getItem('userData')) || { portfolio: {} };
    let myPortfolio = userData.portfolio || {};
    
    // 1. 보유 중인 선수만 가져오기
    let ownedPlayers = allPlayers.filter(p => myPortfolio[p.id] && myPortfolio[p.id].qty > 0);

    // 2. 핵심 로직: 포지션 필터링
    let fitPlayers = ownedPlayers.filter(player => {
        const pRoles = player.roles || []; // 선수에게 등록된 역할 배열
        
        // [규칙 1] 플렉스 슬롯은 누구든 가능
        if (slotRole === "플렉스") return true;
        
        // [규칙 2] 해당 포지션(slotRole)이 선수 역할에 포함되어야 함
        return pRoles.includes(slotRole);
    });

    if (fitPlayers.length === 0) {
        listDiv.innerHTML = `<p style="font-size:0.8rem; color:#fa5252; text-align:center;">배치 가능한 선수가 없습니다.</p>`;
    } else {
        fitPlayers.forEach(player => {
            listDiv.innerHTML += `
                <button onclick="selectPlayerForSlot('${player.id}')" style="text-align:left; background:#f1f3f5; border:1px solid #ced4da; padding:8px; border-radius:6px; cursor:pointer; width:100%; margin-bottom:4px;">
                    <strong>${player.name}</strong> 
                    <span style="font-size:0.75rem; color:#868e96;">(${player.roles.join(', ')})</span>
                </button>
            `;
        });
    }
    if (modal) modal.style.display = 'block';
}

function executeTrade(type) {
    const players = JSON.parse(localStorage.getItem('market_players'));
    const teams = JSON.parse(localStorage.getItem('market_teams'));
    let userData = JSON.parse(localStorage.getItem('userData'));
    
    const pid = document.getElementById('tradeSelect').value;
    const qty = parseInt(document.getElementById('tradeQuantity').value);
    if(!qty || qty <= 0) return alert("올바른 수량을 입력하세요.");
    
    let p = [...players, ...teams].find(item => item.id === pid);
    let totalCost = p.price * qty;

    if (type === 'BUY') {
        if (userData.seed < totalCost) return alert("자금이 부족합니다.");
        userData.seed -= totalCost;
        if (!userData.portfolio[pid]) userData.portfolio[pid] = { qty: 0, avgPrice: 0 };
        let hold = userData.portfolio[pid];
        hold.avgPrice = ((hold.avgPrice * hold.qty) + totalCost) / (hold.qty + qty);
        hold.qty += qty;
    } else {
        if (!userData.portfolio[pid] || userData.portfolio[pid].qty < qty) return alert("보유 수량이 부족합니다.");
        userData.seed += totalCost; userData.portfolio[pid].qty -= qty;
        // 💡 [매도 성공 로직 내부] 선수의 보유 수량이 0이 되었는지 확인하는 부분입니다.
if (userData.portfolio[pid] && userData.portfolio[pid].qty <= 0) {
    
    // 주식이 아예 없으므로 포트폴리오 객체에서 완전히 제거 (선택사항)
    delete userData.portfolio[pid]; 

    // 💡 [핵심] 드림팀(myFantasyTeam) 슬롯을 돌면서 매도한 선수(pid)가 있는지 확인하고 삭제
    for (const slotRole in myFantasyTeam) {
        if (myFantasyTeam[slotRole] === pid) {
            myFantasyTeam[slotRole] = null; // 라인업에서 자동 해제
        }
    }

    // 변경된 드림팀 데이터를 로컬스토리지에 영구 저장
    localStorage.setItem('myFantasyTeam', JSON.stringify(myFantasyTeam));
}

// 이후 기존에 있던 UI 업데이트 함수들을 호출해 줍니다.
localStorage.setItem('userData', JSON.stringify(userData));
renderAll();       // 전광판 및 포트폴리오 리프레시
updateFantasyUI(); // 드림팀 UI 리프레시 (라인업 빠진 것 반영)
        if(userData.portfolio[pid].qty === 0) delete userData.portfolio[pid];
    }

    
    localStorage.setItem('userData', JSON.stringify(userData));
    document.getElementById('tradeQuantity').value = '';
    renderAll();

    
}

function renderChart(currentList) {
    const item = currentList.find(x => x.id === currentSelectedId);
    if (!item) return;

// 💡 [버그 수정] 차트 상단 타이틀을 선택된 선수/팀 이름으로 실시간 교체
    const chartTitleElement = document.getElementById('chartTitle');
    if (chartTitleElement) {
        // 팀 주식이면 [팀] 태그를, 선수면 이름을 직관적으로 노출
        chartTitleElement.innerText = item.type === 'TEAM' ? `[팀] ${item.name}` : item.name;
    }

    const canvasElement = document.getElementById('stockChart');
    if (!canvasElement) {
        console.warn("화면에 'stockChart' 태그가 존재하지 않습니다.");
        return; 
    }
    
    const ctx = canvasElement.getContext('2d');
    
    if (window.myChartObj) {
        window.myChartObj.destroy();
    }

    // 📌 [글로벌 스탠다드 1] 직전 회차 대비 현재가 비교로 '전체 테마 색상' 결정
    const hasHistory = item.history.length > 1;
    const currentPrice = item.history[item.history.length - 1];
    const previousPrice = hasHistory ? item.history[item.history.length - 2] : item.history[0];

    const isUp = currentPrice >= previousPrice;
    
    // 한국 거래소 및 e스포츠 직관성 국룰 (상승=빨강, 하락=파랑)
    // 만약 해외 순수 증권사 느낌을 원하시면 초록색(#26a69a)과 빨간색(#ef5350)으로 바꾸셔도 됩니다.
    const mainColor = isUp ? '#fa5252' : '#228be6'; 
    
    // 선 아래 은은하게 채워지는 프리미엄 그라데이션 Area 효과
    const gradient = ctx.createLinearGradient(0, 0, 0, canvasElement.height || 300);
    gradient.addColorStop(0, isUp ? 'rgba(250, 82, 82, 0.2)' : 'rgba(34, 139, 230, 0.2)');
    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

    const labels = item.history.map((_, index) => index === 0 ? "상장" : `${index}회`);

    window.myChartObj = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: item.name,
                data: item.history,
                borderColor: mainColor,
                backgroundColor: gradient,
                fill: true,           
                borderWidth: 2,      
                tension: 0,           
                pointRadius: 0,         
                pointHitRadius: 10,     
                
              
                pointHoverRadius: 5,    
                pointHoverBackgroundColor: mainColor,
                pointHoverBorderColor: '#fff',
                pointHoverBorderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                intersect: false,       
                mode: 'index'
            },
            plugins: {
                legend: { display: false }, 
                tooltip: {
                   
                    backgroundColor: 'rgba(33, 37, 41, 0.95)',
                    titleFont: { size: 12, weight: 'bold' },
                    bodyFont: { size: 12 },
                    padding: 8,
                    cornerRadius: 4,
                    displayColors: false,
                    callbacks: {
                        label: function(context) {
                            return ` 주가: ${Math.round(context.raw).toLocaleString()}원`;
                        }
                    }
                }
            },
            scales: {
                x: {
                    grid: { display: false }, // 격자 세로선 제거하여 가독성 업
                    ticks: { color: '#868e96', font: { size: 11 } }
                },
                y: {
                    position: 'right', // 📌 [글로벌 스탠다드 3] 실제 주식 차트는 현재가를 쉽게 보려고 Y축이 우측에 있습니다.
                    grid: { color: '#f1f3f5' }, 
                    ticks: {
                        color: '#868e96',
                        font: { size: 11 },
                        callback: function(value) {
                            return value.toLocaleString() + "원"; 
                        }
                    }
                }
            }
        }
    });
}

// [타격대 / 척후대 / 전략가 / 감시자 / 플렉스] 5대 직관적 포지션 셋업
const SLOT_ROLES = ["타격대", "척후대", "전략가", "감시자", "플렉스"];

let myFantasyTeam = JSON.parse(localStorage.getItem('my_fantasy_team_v3')) || {
    "타격대": null, "척후대": null, "전략가": null, "감시자": null, "플렉스": null
};
let currentSelectingSlot = null; 

// 💰 드림팀의 총 주가 및 실시간 스쿼드 변동률(%) 계산 반영 버전
function updateFantasyUI() {
    const rosterDiv = document.getElementById('fantasyRoster');
    if (!rosterDiv) return;

    rosterDiv.innerHTML = '';
    let allPlayers = JSON.parse(localStorage.getItem('market_players')) || [];
    let emptySlots = 0;
    let hasFixedIgl = false;
    
    let totalTeamValue = 0;   // 현재 주가 총합
    let prevTeamValue = 0;    // 직전 주가 총합 (변동률 계산용)

    SLOT_ROLES.forEach(slotRole => {
        const pId = myFantasyTeam[slotRole];
        const player = allPlayers.find(x => x.id === pId);

        if (player) {
            // [1] 실시간 현재가 및 직전가 합산 데이터 축적
            totalTeamValue += Math.round(player.price);
            
            // 직전 회차 가격이 있으면 그것을 더하고, 없으면 상장가(history[0])를 더함
            const prevPrice = player.history.length > 1 ? player.history[player.history.length - 2] : player.history[0];
            prevTeamValue += Math.round(prevPrice);

           
    }});

    // 💡 [2] 핵심: 드림팀 총합 변동률(%) 연산 및 UI 렌더링
    const valueDisplay = document.getElementById('fantasyTotalValue');
    const rateDisplay = document.getElementById('fantasyTotalRate');

    if (valueDisplay) {
        valueDisplay.innerText = totalTeamValue.toLocaleString() + "원";
    }

    if (rateDisplay) {
        if (totalTeamValue === 0 || prevTeamValue === 0) {
            // 등록된 선수가 아무도 없을 때
            rateDisplay.innerText = "(0.0%)";
            rateDisplay.style.color = "#868e96";
        } else {
            // 변동률 공식 산출
            const changeRate = (((totalTeamValue - prevTeamValue) / prevTeamValue) * 100).toFixed(1);
            
            if (changeRate > 0) {
                rateDisplay.innerText = `(▲${changeRate}%)`;
                rateDisplay.style.color = "#fa5252"; // 상승 시 빨간색
            } else if (changeRate < 0) {
                rateDisplay.innerText = `(▼${Math.abs(changeRate)}%)`;
                rateDisplay.style.color = "#228be6"; // 하락 시 파란색
            } else {
                rateDisplay.innerText = "(0.0%)";
                rateDisplay.style.color = "#868e96"; // 변동 없음 회색
            }
        }
    }

  
}

            emptySlots++;
            rosterDiv.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#fff; padding:10px; border-radius:6px; font-size:0.9rem; border: 1px dashed #dee2e6; color:#adb5bd;">
                    <span>[${slotRole}]    배치 가능</span>
                    <button onclick="openRosterSelector('${slotRole}')" style="background:#e9ecef; border:none; padding:3px 8px; border-radius:4px; color:#495057; font-size:0.75rem; cursor:pointer;">+ 선수 선택</button>
                </div>
            `;
        }
    });

    // 💡 HTML 상단에 총 주가 전광판 UI 결합 출력
    const valueDisplay = document.getElementById('fantasyTotalValue');
    if (valueDisplay) {
        valueDisplay.innerText = totalTeamValue.toLocaleString() + "원";
    }

    const statusSpan = document.getElementById('fantasyStatus');
    if (emptySlots === 0 && hasFixedIgl) {
        statusSpan.innerText = "라인업 완성";
        statusSpan.style.color = '#2b8a3e';
        statusSpan.style.background = '#e7f5ff';
    } else {
        let errorMsg = "";
        if (emptySlots > 0) errorMsg = `${emptySlots}명 필요`;
        else if (!hasFixedIgl) errorMsg = "⚠️ IGL 필요";
        
        statusSpan.innerText = errorMsg;
        statusSpan.style.color = '#e03131';
        statusSpan.style.background = '#fff5f5';
    }
}
// 선수 슬롯 배치 로직
function selectPlayerForSlot(playerId) {
    let allPlayers = JSON.parse(localStorage.getItem('market_players')) || [];
    let target = allPlayers.find(x => x.id === playerId);
    
    if (Object.values(myFantasyTeam).includes(target.id)) {
        alert("이미 다른 포지션에 등록된 선수입니다!");
        return;
    }

// 💡 [에러 방지] roles 데이터가 없는 일반 선수들을 위한 기본값 예외 처리
    const playerRoles = target.roles || ["타격대"]; // 역할 지정 안 된 선수는 기본 타격대 처리
    
    const pureRolesCount = playerRoles.filter(r => r !== "IGL").length;
    const isMultiPlayer = pureRolesCount >= 2; 

    // 포지션 매칭 디펜스 가드
    if (currentSelectingSlot === "플렉스") {
        // 플렉스 자리는 아무나 프리패스
    } else if (!playerRoles.includes(currentSelectingSlot) && !isMultiPlayer) {
        alert(`❌ 배정 불가! '${target.name}' 이 선수는 [${currentSelectingSlot}]가 아닙니다.`);
        return;
    }

    myFantasyTeam[currentSelectingSlot] = target.id;
    localStorage.setItem('my_fantasy_team_v2', JSON.stringify(myFantasyTeam));
    closeSelectorModal();
    updateFantasyUI();
}

function closeSelectorModal() {
    document.getElementById('playerSelectorModal').style.display = 'none';
}

function removeFromFantasy(slotRole) {
    myFantasyTeam[slotRole] = null;
    localStorage.setItem('my_fantasy_team_v2', JSON.stringify(myFantasyTeam));
    updateFantasyUI();
}

function saveFantasyTeam() {
    let allPlayers = JSON.parse(localStorage.getItem('market_players')) || [];
    let isFull = Object.values(myFantasyTeam).every(x => x !== null);
    
    // 고정 IGL 체크 로직
    let hasFixedIgl = false;
    for (let role in myFantasyTeam) {
        let id = myFantasyTeam[role];
        let p = allPlayers.find(x => x.id === id);
        if (p && p.roles && p.roles.includes("IGL")) {
            hasFixedIgl = true;
        }
    }

    if (!isFull) return alert("5명의 선수를 모두 선택 해야 저장 가능합니다.!");
    if (!hasFixedIgl) return alert("❌ 저장 불가! IGL을 최소 1명 선택하세요.");

    // 💡 핵심: 아래 코드가 추가되어야 새로고침해도 데이터가 유지됩니다.
    localStorage.setItem('my_fantasy_team_v3', JSON.stringify(myFantasyTeam));

    alert("🏆 [라인업 확정] 라인업이 성공적으로 저장되었습니다!");
}

function filterStocks() {
    const keyword = document.getElementById('searchTicker').value.toLowerCase();
    const items = document.querySelectorAll('.ticker-item');
    items.forEach(item => {
        const name = item.querySelector('strong').innerText.toLowerCase();
        item.style.display = name.includes(keyword) ? '' : 'none';
    });
}

updateFantasyUI();

window.addEventListener('storage', renderAll);
window.onload = renderAll;
</script>
