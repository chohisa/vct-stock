
<!DOCTYPE html>
 <html lang="ko">
 <head>
 <meta charset="UTF-8">
 <title>VCT 라이브 매치 시뮬레이터 v1.6</title>
 <style>
 body { font-family: 'Malgun Gothic', sans-serif; background: #111; color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
 .container { width: 1000px; display: flex; gap: 20px; }
 .main-panel { flex: 2; display: flex; flex-direction: column; }
 .side-panel { flex: 1.3; background: #222; padding: 15px; border-radius: 6px; border: 1px solid #444; }
 
 /* 상단 전광판 및 맵 정보 */
 .scoreboard { background: #1f2326; border-bottom: 4px solid #ff4655; padding: 15px; border-radius: 6px; text-align: center; margin-bottom: 15px; position: relative; }
 .map-info { position: absolute; top: 10px; right: 15px; font-size: 12px; color: #cccccc; background: #333; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
 
 /* 팀 이름을 흰색으로 통일 */
 .team-name-display { color: #ffffff; font-weight: bold; display: inline-block; }
 .team-score { font-size: 32px; font-weight: bold; color: #ece8e1; letter-spacing: 2px; }
 .status-text { font-size: 14px; color: #ff4655; font-weight: bold; margin-top: 5px; min-height: 20px; }
 
 /* 문자 중계창 */
 .log-container { background: #181c1e; padding: 15px; border-radius: 6px; height: 520px; overflow-y: auto; border: 1px solid #333; font-size: 13px; line-height: 1.8; }
 .log-line { margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px dashed #2a2a2a; }
 
 /* 킬로그 및 매치 로그 스타일 */
 .kill-row { padding-left: 5px; font-family: monospace; font-size: 13px; margin: 3px 0; }
 .time-stamp { color: #ece8e1; margin-right: 8px; font-weight: bold; background: #2a2a2a; padding: 1px 5px; border-radius: 3px; display: inline-block; min-width: 42px; text-align: center; }
 .spike-time-stamp { color: #ece8e1; margin-right: 8px; font-weight: bold; background: #7C3442; padding: 1px 5px; border-radius: 3px; display: inline-block; min-width: 42px; text-align: center; }
 
 /* 공격/수비 색상 스타일 */
 .p-atk { color: #D76474; font-weight: bold; } 
 .p-def { color: #5CF8DF; font-weight: bold; } 
 .kill-arrow { color: #fff; margin: 0 6px; font-weight: bold; }
 
 /* 알림창 스타일 */
 .spike-alert { background: #B35F5E; color: #ece8e1; padding: 4px 8px; border-radius: 4px; font-weight: bold; margin: 6px 0; border-left: 4px solid #7D313F; }
 .defuse-alert { background: #5B5863; color: #ece8e1; padding: 4px 8px; border-radius: 4px; font-weight: bold; margin: 6px 0; border-left: 4px solid #1B8877; }
 .round-result { background: #252525; padding: 10px; border-radius: 4px; font-weight: bold; margin-top: 8px; margin-bottom: 12px; border-left: 4px solid #fff; font-size: 13px; }
 
 /* KDA 테이블 */
 table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; margin-bottom: 15px; }
 th { color: #bbb; padding: 6px; font-size: 12px; }
 td { padding: 6px; border-bottom: 1px solid #3a3a3a; }
 
 .team-header { color: #ffffff !important; font-weight: bold; text-align: left; padding-left: 10px; font-size: 15px; }
 .side-atk { background-color: #7D313F !important; }
 .side-def { background-color: #1B8877 !important; }
 
 /* 컨트롤 버튼 */
 .ctrl-box { display: flex; gap: 10px; margin-bottom: 15px; }
 button { padding: 12px 24px; background: #ff4655; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 15px; transition: 0.1s; }
 button:hover { background: #dc3d4b; }
 button:disabled { background: #555; cursor: not-allowed; }
 </style>
 </head>
 <body>
 
 <h2>VCT LIVE MATCH SIMULATOR (메커니즘 동기화 v1.6)</h2>
 
 <div class="ctrl-box">
 <button id="startBtn" onclick="initMatch()">경기 시작</button>
 </div>
 
 <div class="container">
 <div class="main-panel">
 <div class="scoreboard">
 <div class="map-info" id="mapDisplay">MAP: 대기 중</div>
 <div class="scoreboard-container">
 <div class="team-score">
 <!-- [변경] 라운드가 표시되는 전광판은 풀네임(T1 / Gen.G) 고정 -->
 <span class="team-name-display" id="nameDisplayA">T1</span> 
 <span id="scoreA">0</span> : <span id="scoreB">0</span> 
 <span class="team-name-display" id="nameDisplayB">Gen.G</span>
 </div>
 </div>
 <div class="status-text" id="matchStatus">경기 시작 버튼을 눌러 경기를 시작해 주세요.</div>
 </div>
 <div class="log-container" id="logBox">
 <div class="log-line" style="color: #888;">[시스템] 버튼을 누르면 경기가 시작됩니다.</div>
 </div>
 </div>
 
 <div class="side-panel">
 <h3 style="margin-top:0; color:#ece8e1; border-bottom:2px solid #555; padding-bottom:5px;">실시간 팀별 순위표</h3>
 <table>
 <thead>
 <tr><th colspan="4" id="headerA" class="team-header">T1</th></tr>
 <tr><th style="width:45%; text-align:left; padding-left:10px;">선수 이름</th><th style="width:25%;">선택 요원</th><th>K</th><th>D</th><th>A</th></tr>
 </thead>
 <tbody id="statsA"></tbody>
 </table>
 <table>
 <thead>
 <tr><th colspan="4" id="headerB" class="team-header">Gen.G</th></tr>
 <tr><th style="width:45%; text-align:left; padding-left:10px;">선수 이름</th><th style="width:25%;">선택 요원</th><th>K</th><th>D</th><th>A</th></tr>
 </thead>
 <tbody id="statsB"></tbody>
 </table>
 </div>
 </div>
 
 <script>
 const maps = ["어센트 (Ascent)", "바인드 (Bind)", "헤이븐 (Haven)", "스플릿 (Split)", "브리즈 (Breeze)", "펄 (Pearl)", "로터스 (Lotus)", "프랙처 ( Fracture)"];
 const sites = ["A", "B", "C"];
 
 // [변경] 시뮬레이션 내부 연산용 데이터 구조 (fullName과 약어 shortName 추가)
 let teamA = {
 name: "T1", fullName: "T1", shortName: "T1", score: 0, side: "공격",
 players: [
 { name: "Meteor", agent: "바이퍼", aim: 93, k: 0, d: 0, a: 0, isIgl: false },
 { name: "iZu", agent: "체임버", aim: 85, k: 0, d: 0, a: 0, isIgl: false },
 { name: "Munchkin", agent: "오멘", aim: 84, k: 0, d: 0, a: 0, isIgl: false },
 { name: "stax", agent: "스카이", aim: 88, k: 0, d: 0, a: 0, isIgl: false },
 { name: "BuZz", agent: "네온", aim: 83, k: 0, d: 0, a: 0, isIgl: true }
 ]
 };
 
 let teamB = {
 name: "Gen.G", fullName: "Gen.G", shortName: "Gen", score: 0, side: "수비",
 players: [
 { name: "t3xture", agent: "레이즈", aim: 95, k: 0, d: 0, a: 0, isIgl: false },
 { name: "ash", agent: "네온", aim: 89, k: 0, d: 0, a: 0, isIgl: false },
 { name: "Lakia", agent: "페이드", aim: 83, k: 0, d: 0, a: 0, isIgl: false },
 { name: "ZynX", agent: "바이스", aim: 86, k: 0, d: 0, a: 0, isIgl: true },
 { name: "Karon", agent: "오멘", aim: 90, k: 0, d: 0, a: 0, isIgl: false }
 ]
 };
 
 let currentRound = 1;
 let isMatchActive = false;
 let roundQueue = [];
 let queueInterval = null;
 
 function updateSideColors() {
 const classA = teamA.side === "공격" ? "side-atk" : "side-def";
 const classB = teamB.side === "공격" ? "side-atk" : "side-def";
 document.getElementById("headerA").className = "team-header " + classA;
 document.getElementById("headerB").className = "team-header " + classB;
 document.getElementById("headerA").innerText = ${teamA.fullName} (${teamA.side});
 document.getElementById("headerB").innerText = ${teamB.fullName} (${teamB.side});
 }
 
 function updateStatTables() {
 ['A', 'B'].forEach(t => {
 const team = t === 'A' ? teamA : teamB;
 const tbody = document.getElementById(stats${t});
 tbody.innerHTML = '';
 let sortedPlayers = [...team.players].sort((x, y) => (y.k !== x.k) ? (y.k - x.k) : (x.d - y.d));
 sortedPlayers.forEach((p) => {
 let nameDisplay = p.isIgl ? [IGL] ${p.name} : p.name;
 tbody.innerHTML += <tr>
 <td style="text-align:left; padding-left:10px; font-weight:bold;">${nameDisplay}</td>
 <td style="color:#fff; font-weight:bold;">${p.agent}</td>
 <td style="color:#fff; font-weight:bold;">${p.k}</td>
 <td style="color:#fff;">${p.d}</td>
 <td style="color:#fff;">${p.a}</td>
 </tr>;
 });
 });
 }
 
 function initMatch() {
 if(queueInterval) clearInterval(queueInterval);
 const chosenMap = maps[Math.floor(Math.random() * maps.length)];
 document.getElementById("mapDisplay").innerText = MAP: ${chosenMap};
 
 teamA.score = 0; teamA.side = "공격";
 teamB.score = 0; teamB.side = "수비";
 currentRound = 1;
 
 [teamA, teamB].forEach(team => team.players.forEach(p => { p.k = 0; p.d = 0; p.a = 0; }));
 document.getElementById("scoreA").innerText = "0";
 document.getElementById("scoreB").innerText = "0";
 
 // 전광판 풀네임 초기 강제 세팅
 document.getElementById("nameDisplayA").innerText = teamA.fullName;
 document.getElementById("nameDisplayB").innerText = teamB.fullName;
 
 document.getElementById("logBox").innerHTML = <div class="log-line" style="color:#00ffcc; font-weight:bold;">[시스템] 경기가 시작되었습니다. 곧 전반전 피스톨 라운드가 시작됩니다.</div>;
 
 updateSideColors();
 updateStatTables();
 isMatchActive = true;
 generateRoundData(); 
 }
 
 // [변경] 선수 이름 옆에 들어가는 소속 팀 표시를 약자(shortName -> T1, Gen)로 적용
 function makeKillLogHtml(isSpikeMode, timeVal, kTeam, killer, kVTeam, victim, isExplosion = false) {
 let victimClass = kVTeam.side === "공격" ? "p-atk" : "p-def";
 let timeTag = isSpikeMode ? <span class="spike-time-stamp">${timeVal}</span> : <span class="time-stamp">${timeVal}</span>;
 
 if (isExplosion) {
 return <div class="kill-row">
 ${timeTag}
 <span style="color:#ffb3b3; font-weight:bold;">💥</span>
 <span class="kill-arrow">➔</span>
 <span class="${victimClass}">${kVTeam.shortName} ${victim.name}(${victim.agent})</span>
 </div>;
 }
 let killerClass = kTeam.side === "공격" ? "p-atk" : "p-def";
 return <div class="kill-row">
 ${timeTag}
 <span class="${killerClass}">${kTeam.shortName} ${killer.name}(${killer.agent})</span>
 <span class="kill-arrow">➔</span>
 <span class="${victimClass}">${kVTeam.shortName} ${victim.name}(${victim.agent})</span>
 </div>;
 }
 
 function generateRoundData() {
 if (!isMatchActive) return;
 roundQueue = [];
 
 let atkTeam = teamA.side === "공격" ? teamA : teamB;
 let defTeam = teamA.side === "수비" ? teamA : teamB;
 
 if (currentRound === 13) {
 teamA.side = "수비"; teamB.side = "공격";
 atkTeam = teamA.side === "공격" ? teamA : teamB;
 defTeam = teamA.side === "수비" ? teamA : teamB;
 roundQueue.push({ type: "swap", html: <div class="log-line" style="color:#FFFFCA; font-weight:bold; text-align:center; background:#222; padding:5px;">=== 공수 교대 ===</div> });
 }
 
 roundQueue.push({ type: "text", html: <div style="margin-top:10px; color:#aaa; font-weight:bold;">[ROUND ${currentRound} 시작]</div> });
 
 let aliveA = [...teamA.players];
 let aliveB = [...teamB.players];
 
 let roundTime = 95; 
 let spikeTime = 45; 
 let isPlanted = false;
 let isDefused = false;
 let defuseProgress = 0; 
 
 let mapName = document.getElementById("mapDisplay").innerText;
 let chosenSite = sites[Math.floor(Math.random() * (mapName.includes("헤이븐") || mapName.includes("로터스") ? 3 : 2))];
 
 let pA = teamA.players.reduce((s, p) => s + p.aim, 0) / 5 + (Math.random() * 40 - 20);
 let pB = teamB.players.reduce((s, p) => s + p.aim, 0) / 5 + (Math.random() * 40 - 20);
 let rWinner = pA > pB ? teamA : teamB;
 
 let loopBreak = false;
 
 while (aliveA.length > 0 && aliveB.length > 0 && !loopBreak) {
 let curAliveAtk = (teamA.side === "공격") ? aliveA : aliveB;
 let curAliveDef = (teamA.side === "수비") ? aliveA : aliveB;
 
 if (!isPlanted) {
 roundTime -= Math.floor(Math.random() * 8) + 12;
 if (roundTime <= 4) roundTime = 5;
 
 if (roundTime <= 65) {
 let basePlantChance = 0.45;
 let ratio = curAliveAtk.length / curAliveDef.length; 
 let finalPlantChance = basePlantChance * ratio; 
 if(finalPlantChance > 0.85) finalPlantChance = 0.85;
 if(finalPlantChance < 0.10) finalPlantChance = 0.10;
 
 if (Math.random() < finalPlantChance) {
 isPlanted = true;
 let planter = curAliveAtk[Math.floor(Math.random() * curAliveAtk.length)];
 roundQueue.push({ 
 type: "text", 
 html: <div class="spike-alert">SPIKE ${planter.name} 선수가 ${chosenSite} 사이트에 스파이크를 설치했습니다.</div> 
 });
 continue;
 }
 }
 } else {
 let timeDrop = Math.floor(Math.random() * 4) + 5;
 spikeTime -= timeDrop;
 if (spikeTime <= 0) break;
 
 if (rWinner.side === "수비" && Math.random() < 0.35 && !isDefused && curAliveDef.length > 0) {
 let attemptTime = Math.floor(Math.random() * 3) + 3; 
 defuseProgress += attemptTime;
 let defuser = curAliveDef[Math.floor(Math.random() * curAliveDef.length)];
 
 if (defuseProgress >= 7) {
 isDefused = true;
 roundQueue.push({ 
 type: "text", 
 html: <div class="defuse-alert">DEFUSE ${defuser.name} 선수가 스파이크를 해체했습니다.</div> 
 });
 break;
 } else if (defuseProgress >= 3.5 && defuseProgress - attemptTime < 3.5) {
 defuseProgress = 3.5; 
 roundQueue.push({ 
 type: "text", 
 html: <div class="defuse-alert">DEFUSE ${defuser.name} 선수가 스파이크를 반해체했습니다.</div> 
 });
 }
 }
 }
 
 let curTimeStr = !isPlanted ? ${Math.floor(roundTime / 60)}:${(roundTime % 60).toString().padStart(2, '0')} : ${spikeTime};
 
 let atkP = aliveA.reduce((s, p) => s + p.aim, 0) / aliveA.length + (Math.random() * 20 - 10);
 let defP = aliveB.reduce((s, p) => s + p.aim, 0) / aliveB.length + (Math.random() * 20 - 10);
 
 if (atkP > defP) {
 let kIdx = Math.floor(Math.random() * aliveA.length);
 let dIdx = Math.floor(Math.random() * aliveB.length);
 roundQueue.push({
 type: "kill", isSpike: isPlanted, time: curTimeStr, isExplosion: false,
 killerTeam: teamA, killer: aliveA[kIdx], victimTeam: teamB, victim: aliveB[dIdx]
 });
 aliveB.splice(dIdx, 1);
 } else {
 let kIdx = Math.floor(Math.random() * aliveB.length);
 let dIdx = Math.floor(Math.random() * aliveA.length);
 roundQueue.push({
 type: "kill", isSpike: isPlanted, time: curTimeStr, isExplosion: false,
 killerTeam: teamB, killer: aliveB[kIdx], victimTeam: teamA, victim: aliveA[dIdx]
 });
 aliveA.splice(dIdx, 1);
 } 
 
 if (isPlanted) {
 let testAtkList = (teamA.side === "공격") ? aliveA : aliveB;
 let testDefList = (teamA.side === "수비") ? aliveA : aliveB;
 
 if (testAtkList.length > 0 && testDefList.length === 0) {
 loopBreak = true;
 }
 else if (testAtkList.length === 0 && testDefList.length > 0) {
 let requiredTime = (defuseProgress >= 3.5) ? 3.5 : 7;
 if (spikeTime < requiredTime && !isDefused) {
 loopBreak = true;
 }
 }
 } else {
 if (aliveA.length === 0 || aliveB.length === 0) loopBreak = true;
 }
 }
 
 let reason = "전멸 승리";
 let finalRoundWinner = null;
 let finalAtkList = (teamA.side === "공격") ? aliveA : aliveB;
 let finalDefList = (teamA.side === "수비") ? aliveA : aliveB;
 
 if (isPlanted) {
 if (finalAtkList.length > 0 && finalDefList.length === 0) {
 finalRoundWinner = atkTeam;
 reason = "전멸 승리";
 } 
 else if (finalAtkList.length === 0 && finalDefList.length > 0) {
 let requiredTime = (defuseProgress >= 3.5) ? 3.5 : 7;
 
 if (spikeTime < requiredTime && !isDefused) {
 finalRoundWinner = atkTeam;
 reason = "스파이크 폭파 승리";
 
 let remainingDefenders = [...finalDefList];
 remainingDefenders.forEach(victimPlayer => {
 let vTeam = (teamA.players.some(p => p.name === victimPlayer.name)) ? teamA : teamB;
 roundQueue.push({
 type: "kill", isSpike: true, time: "0", isExplosion: true,
 killerTeam: null, killer: null, victimTeam: vTeam, victim: victimPlayer
 });
 victimPlayer.d++;
 });
 if (teamA.side === "수비") aliveA = []; else aliveB = [];
 } 
 else {
 finalRoundWinner = defTeam;
 reason = "스파이크 해체 승리"; 
 if (!isDefused) {
 roundQueue.push({ 
 type: "text", 
 html: <div class="defuse-alert">DEFUSE 수비팀이 스파이크를 해체했습니다.</div> 
 });
 }
 }
 } 
 else if (isDefused) {
 finalRoundWinner = defTeam;
 reason = "스파이크 해체 승리";
 } 
 else {
 finalRoundWinner = atkTeam;
 reason = "스파이크 폭파 승리";
 }
 } else {
 if (aliveA.length === 0) finalRoundWinner = teamB;
 else if (aliveB.length === 0) finalRoundWinner = teamA;
 else finalRoundWinner = rWinner;
 reason = "전멸 승리";
 }
 
 roundQueue.push({
 type: "end", winnerName: finalRoundWinner.fullName, winnerShortName: finalRoundWinner.shortName,
 winnerSideBadge: finalRoundWinner.side === "공격" ? "공격" : "수비", endReason: reason
 });
 
 let intervalSpeed = 800; 
 if(roundQueue.length > 0) {
 intervalSpeed = Math.floor(6000 / roundQueue.length); 
 }
 document.getElementById("matchStatus").innerText = ${currentRound}라운드 진행 중...;
 queueInterval = setInterval(processQueue, intervalSpeed);
 }
 
 function processQueue() {
 const logBox = document.getElementById("logBox");
 if (roundQueue.length === 0) {
 clearInterval(queueInterval);
 return;
 }
 
 let item = roundQueue.shift();
 
 if (item.type === "text" || item.type === "swap") {
 logBox.innerHTML += item.html;
 if(item.type === "swap") updateSideColors();
 } 
 else if (item.type === "kill") {
 if (!item.isExplosion) {
 let origKiller = item.killerTeam.players.find(p => p.name === item.killer.name);
 let origVictim = item.victimTeam.players.find(p => p.name === item.victim.name);
 origKiller.k++;
 origVictim.d++;
 }
 logBox.innerHTML += makeKillLogHtml(item.isSpike, item.time, item.killerTeam, item.killer, item.victimTeam, item.victim, item.isExplosion);
 updateStatTables();
 } 
 else if (item.type === "end") {
 let rWinTeam = (item.winnerName === teamA.fullName) ? teamA : teamB;
 rWinTeam.score++;
 
 let resColor = rWinTeam.shortName === "T1" ? "#1B8877" : "#7D313F";
 document.getElementById("scoreA").innerText = teamA.score;
 document.getElementById("scoreB").innerText = teamB.score;
 
 // [변경] 결과 메시지에서도 풀네임(fullName)을 적용하여 통일성 유지
 logBox.innerHTML += <div class="round-result" style="border-left-color: ${resColor};">
 라운드 종료: ${item.winnerName} (${item.winnerSideBadge}) 승리 - <span style="color:#FFFFCA;">${item.endReason}</span> <span style="color:#aaa; margin-left:10px;"></span>
 </div>;
 
 if (teamA.score >= 13 || teamB.score >= 13) {
 let finalWinner = teamA.score >= 13 ? teamA.fullName : teamB.fullName;
 document.getElementById("matchStatus").innerText = 경기 우승팀: ${finalWinner}!;
 logBox.innerHTML += <div style="background:#1B8877; color:#fff; font-weight:bold; text-align:center; padding:10px; border-radius:4px; margin-top:15px;">
 MATCH FINISHED 최종 스코어 ${teamA.score} 대 ${teamB.score}로 ${finalWinner} 승리!
 </div>;
 isMatchActive = false;
 } else {
 currentRound++;
 let autoDelay = (currentRound === 13) ? 3000 : 2000; 
 let delaySeconds = autoDelay / 1000;
 document.getElementById("matchStatus").innerText = 라운드 마감. ${delaySeconds}초 후 다음 라운드로 자동 진입합니다.;
 setTimeout(() => {
 if(isMatchActive) generateRoundData();
 }, autoDelay);
 }
 }
 logBox.scrollTop = logBox.scrollHeight;
 }
 </script>
 </body>
 </html>
